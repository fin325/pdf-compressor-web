<!DOCTYPE html>
<html>
<head>
    <title>PDF Compressor</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; background: #f0f0f0; }
        input, select, button { font-size: 16px; margin: 10px; padding: 5px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        .downloads { margin-top: 20px; }
        .downloads a { display: block; margin: 5px 0; color: #007bff; text-decoration: none; }
        .downloads a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>PDF Compressor</h1>
    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="pdf_files" accept=".pdf" multiple required><br>
        <label>Качество изображений (%):</label>
        <select name="quality">
            <option value="90">90%</option>
            <option value="75" selected>75%</option>
            <option value="50">50%</option>
            <option value="25">25%</option>
        </select><br>
        <button type="submit">Сжать PDF</button>
    </form>

    {% if download_links %}
        <div class="downloads">
            <h2>Сжатые файлы готовы:</h2>
            {% for link in download_links %}
                <a href="{{ link }}">Скачать PDF</a>
            {% endfor %}
        </div>
    {% endif %}
</body>
</html>
