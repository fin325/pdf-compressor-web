<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PDF Compressor</title>
</head>
<body>
    <h1>PDF Compressor</h1>
    <form method="POST" enctype="multipart/form-data">
        <label>Выберите PDF файл:</label>
        <input type="file" name="pdf_file" accept="application/pdf" required><br><br>

        <label>Качество изображений (1-100):</label>
        <input type="number" name="quality" min="1" max="100" value="50"><br><br>

        <button type="submit">Сжать PDF</button>
    </form>
</body>
</html>
