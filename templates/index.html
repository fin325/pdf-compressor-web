<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PDF Compressor von Finevych A.</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            white-space: nowrap;
            margin-bottom: 30px;
        }
        form {
            width: 600px;       /* ширина формы */
            max-width: 90%;     /* адаптивно под экран */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input[type="file"], input[type="number"], button {
            padding: 10px;
            font-size: 16px;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>PDF Compressor von Finevych A.</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf_file" accept="application/pdf" required>
        <input type="number" name="quality" min="1" max="100" value="50">%
        <button type="submit">Compress</button>
    </form>
</body>
</html>
