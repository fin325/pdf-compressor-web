<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} von Finevych A.</title>
<style>
    /* ===== Фон ===== */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        text-align: center;
        background: url("https://raw.githack.com/fin325/pdf-compressor-web/main/static/bg.JPG") center/cover no-repeat fixed;
        position: relative;
    }

    body::before {
        content: "";
        position: absolute;
        top:0; left:0;
        width:100%; height:100%;
        backdrop-filter: blur(15px) brightness(0.6);
        z-index: -1;
    }

    /* ===== Передний стеклянный контейнер ===== */
    .container {
        max-width: 650px;
        margin: 0 auto;
        min-height: 100dvh;
        box-sizing: border-box;
        background: rgba(255,255,255,0.1);
        padding: 20px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        backdrop-filter: blur(10px);
        color: white;
    }

    h1 {
        color: white;
        font-size: 20px;
        margin: 0 0 12px 0;
        font-weight: bold;
    }

    input[type="file"] { display: none; }

    .custom-file-upload { 
        display: inline-block; 
        padding: 14px 28px;
        font-size: 17px;
        background-color: rgba(0,102,255,0.8); 
        color: white; 
        border-radius: 8px; 
        cursor: pointer; 
        margin: 10px 0;
        transition: background 0.3s;
    }
    .custom-file-upload:hover { background-color: rgba(0,82,204,0.8); }

    #file-name { margin: 10px 0 20px 0; font-size: 16px; min-height: 20px; color: white; }

    .quality-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
    .quality-btn { padding: 8px 16px; font-size: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; min-width: 80px; transition: transform 0.2s; }
    .low { background-color: rgba(255,68,68,0.8); color: white; }
    .medium { background-color: rgba(255,170,0,0.8); color: white; }
    .high { background-color: rgba(0,204,102,0.8); color: white; }
    .quality-btn.active { border: 4px solid white; transform: scale(1.08); }

    button[type="submit"] { 
        padding: 12px 40px;
        font-size: 18px;
        background-color: rgba(0,102,255,0.8); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        margin-top: 12px;
        transition: background 0.3s, transform 0.2s;
        display: inline-block; 
    }
    button[type="submit"]:hover { background-color: rgba(0,82,204,0.8); transform: scale(1.02); }

    /* Кнопка повторного скачивания */
    .download-btn {
        display: inline-block;
        padding: 12px 40px;
        font-size: 18px;
        background-color: rgba(0,204,102,0.9); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        text-decoration: none;
        margin-top: 12px;
        font-weight: bold;
        transition: background 0.3s, transform 0.2s;
    }
    .download-btn:hover { background-color: rgba(0,180,90,1); transform: scale(1.05); }

    /* Блок загрузки и полосы */
    .loading { 
        display: none; 
        margin: 15px auto;
        padding: 15px 24px;
        background-color: rgba(255,255,255,0.15); 
        border-radius: 8px; 
        font-size: 16px;
        color: white; 
        width: 80%;
        max-width: 400px;
        box-sizing: border-box;
    }

    .progress-bar-container {
        width: 100%;
        height: 6px;
        background-color: rgba(255,255,255,0.2);
        border-radius: 4px;
        margin-top: 12px;
        overflow: hidden;
        position: relative;
    }

    .progress-bar-inner {
        height: 100%;
        width: 40%;
        background-color: #00cc66; 
        border-radius: 4px;
        position: absolute;
        left: -40%;
        animation: loading-slide 1.5s infinite linear;
    }

    @keyframes loading-slide {
        0% { left: -40%; }
        100% { left: 100%; }
    }

    .feedback { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.3); }
    .feedback button { 
        padding: 8px 16px;
        font-size: 15px;
        margin: 8px;
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        transition: all 0.3s; 
    }
    .like-btn { background-color: rgba(0,204,102,0.8); color: white; }
    .dislike-btn { background-color: rgba(255,68,68,0.8); color: white; }

    #feedback-result { margin-top: 10px; font-size: 15px; color: white; font-weight: bold; }
    .feedback button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .reload-hint { margin-top: 10px; font-size: 13px; color: white; }
</style>
</head>
<body>

<div class="container">
    <h1>PDF Compressor von Finevych A.</h1>

    <form id="uploadForm">
        <label for="pdf_file" class="custom-file-upload">📄 Datei auswählen</label>
        <input type="file" id="pdf_file" name="pdf_file" accept="application/pdf" required>
        <div id="file-name">Noch keine Datei ausgewählt</div>

        <div class="quality-buttons">
            <button type="button" class="quality-btn low" data-value="50" data-label="Niedrig">Niedrig</button>
            <button type="button" class="quality-btn medium active" data-value="30" data-label="Mittel">Mittel</button>
            <button type="button" class="quality-btn high" data-value="25" data-label="Gut">Gut</button>
        </div>

        <input type="hidden" id="quality" name="quality" value="30">
        <button type="submit" id="submitBtn">PDF komprimieren</button>
    </form>

    <div id="result-actions" style="display: none; margin-top: 15px;">
        <p style="color: white; font-size: 15px; margin-bottom: 10px;">✅ Komprimierung abgeschlossen!</p>
        <a id="download-link" href="#" class="download-btn">⬇️ Datei speichern</a>
    </div>

    <p class="reload-hint">Neue Datei? Einfach Seite neu laden 🔄</p>

    <div id="loading" class="loading">
        PDF wird komprimiert... Bitte warten
        <div class="progress-bar-container">
            <div class="progress-bar-inner"></div>
        </div>
    </div>

    <div class="feedback">
        <p><strong>Hat dir die PDF-Komprimierung geholfen?</strong></p>
        <button class="like-btn" id="likeBtn" onclick="sendFeedback('like')">👍 Ja</button>
        <button class="dislike-btn" id="dislikeBtn" onclick="sendFeedback('dislike')">👎 Nein</button>
        <div id="feedback-result">Lade Statistik...</div>
    </div>
</div>

<script>
const form = document.getElementById('uploadForm');
const submitBtn = document.getElementById('submitBtn');
const loadingDiv = document.getElementById('loading');
const resultActionsDiv = document.getElementById('result-actions');
const downloadLink = document.getElementById('download-link');
const qualityInput = document.getElementById('quality');
const qualityBtns = document.querySelectorAll('.quality-btn');
const fileInput = document.getElementById('pdf_file');

let userChoice = localStorage.getItem("pdf_user_choice");

// Выбор качества
qualityBtns.forEach(btn => {
    btn.onclick = () => {
        qualityBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        qualityInput.value = btn.dataset.value;
    };
});

fileInput.onclick = (e) => { e.target.value = null; };

fileInput.onchange = (e) => {
    // При выборе нового файла скрываем кнопку прошлого скачивания
    resultActionsDiv.style.display = 'none'; 
    submitBtn.style.display = 'inline-block';

    if (e.target.files.length > 0) {
        const file = e.target.files[0];
        const sizeMB = (file.size / 1000000).toFixed(2);
        document.getElementById('file-name').textContent = `Datei: ${file.name} (${sizeMB} MB)`;
        updateEstimatedSizes(file.size);
    } else {
        document.getElementById('file-name').textContent = "Noch keine Datei ausgewählt";
        resetEstimatedSizes();
    }
};

// Отправка через AJAX (Fetch) вместо стандартной перезагрузки страницы
form.onsubmit = async (e) => {
    e.preventDefault(); // Блокируем стандартную отправку

    submitBtn.style.display = 'none';
    resultActionsDiv.style.display = 'none';
    loadingDiv.style.display = 'block';

    try {
        const formData = new FormData(form);
        const response = await fetch('/compress', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            throw new Error('Fehler bei der Komprimierung');
        }

        // Получаем файл в память браузера
        const blob = await response.blob();
        
        // Создаем локальную ссылку на файл
        const downloadUrl = window.URL.createObjectURL(blob);
        
        // Формируем имя файла
        const originalName = fileInput.files[0].name;
        const newName = originalName.replace(/\.pdf$/i, '_compressed.pdf');

        // Настраиваем скрытую/видимую кнопку скачивания
        downloadLink.href = downloadUrl;
        downloadLink.download = newName;

        // Останавливаем загрузку, показываем кнопки
        loadingDiv.style.display = 'none';
        submitBtn.style.display = 'inline-block';
        submitBtn.textContent = 'Neu komprimieren'; // Меняем текст для ясности
        resultActionsDiv.style.display = 'block';

        // Автоматически запускаем скачивание один раз
        downloadLink.click();

    } catch (err) {
        console.error("Upload error:", err);
        alert("Ein Fehler ist aufgetreten. Bitte versuche es noch einmal.");
        loadingDiv.style.display = 'none';
        submitBtn.style.display = 'inline-block';
    }
};

async function sendFeedback(action) {
    try {
        const res = await fetch("/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "action=" + action
        });
        const data = await res.json();
        if (data.status === "removed") {
            userChoice = null;
            localStorage.removeItem("pdf_user_choice");
        } else {
            userChoice = action;
            localStorage.setItem("pdf_user_choice", action);
        }
        updateUI(data);
    } catch (err) {
        console.error("Fehler:", err);
    }
}

function updateUI(data) {
    document.getElementById("feedback-result").innerText =
        "👍 " + data.likes + " | 👎 " + data.dislikes + " (" + data.percent + "% zufrieden)";
    
    const likeBtn = document.querySelector('.like-btn');
    const dislikeBtn = document.querySelector('.dislike-btn');

    likeBtn.style.boxShadow = "none";
    dislikeBtn.style.boxShadow = "none";
    likeBtn.style.transform = "scale(1)";
    dislikeBtn.style.transform = "scale(1)";

    if (userChoice === 'like') {
        likeBtn.style.boxShadow = "0 0 0 3px white";
        likeBtn.style.transform = "scale(1.05)";
    } else if (userChoice === 'dislike') {
        dislikeBtn.style.boxShadow = "0 0 0 3px white";
        dislikeBtn.style.transform = "scale(1.05)";
    }
}

fetch("/feedback")
    .then(res => res.json())
    .then(data => updateUI(data))
    .catch(() => document.getElementById("feedback-result").innerText = "Statistik nicht verfügbar");

function updateEstimatedSizes(originalSize) {
    const originalMB = originalSize / 1000000;
    const qualities = [
        { selector: '.low', factor: 0.85 },
        { selector: '.medium', factor: 0.308 },
        { selector: '.high', factor: 0.215 }
    ];
    qualities.forEach(q => {
        const btn = document.querySelector(q.selector);
        const estimatedMB = (originalMB * q.factor).toFixed(2);
        btn.textContent = `${btn.dataset.label} (${estimatedMB} MB)`;
    });
}

function resetEstimatedSizes() {
    const qualities = [
        { selector: '.low', label: 'Niedrig' },
        { selector: '.medium', label: 'Mittel' },
        { selector: '.high', label: 'Gut' }
    ];
    qualities.forEach(q => {
        document.querySelector(q.selector).textContent = q.label;
    });
}
</script>

</body>
</html>
