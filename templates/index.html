<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} von Finevych A.</title>
<style>
    /* ==== Анимация фона ==== */
    @keyframes backgroundMove {
        0% { background-position: center top; }
        50% { background-position: center bottom; }
        100% { background-position: center top; }
    }

    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        min-height: 100vh;

        background-image: url("/static/bg.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        animation: backgroundMove 40s ease-in-out infinite;
        position: relative;
    }

    /* затемнение фона */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.35);
        z-index: -1;
    }

    /* ==== Контейнер стекло ==== */
    .container {
        max-width: 650px;
        margin: 80px auto;
        padding: 40px 30px;
        border-radius: 20px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(15px) saturate(180%);
        -webkit-backdrop-filter: blur(15px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        color: #fff;
    }

    h1 { color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    input[type="file"] { display: none; }

    .custom-file-upload { 
        display: inline-block; 
        padding: 18px 35px; 
        font-size: 19px; 
        background-color: rgba(0,102,255,0.8); 
        color: white; 
        border-radius: 12px; 
        cursor: pointer; 
        margin: 15px 0; 
        transition: 0.3s;
    }
    .custom-file-upload:hover { background-color: rgba(0,82,204,0.9); }

    #file-name { margin: 15px 0 30px 0; font-size: 16px; color: #eee; min-height: 24px; }

    .quality-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 30px 0; }
    .quality-btn { 
        padding: 10px 20px; 
        font-size: 14px; 
        border: none; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: bold; 
        min-width: 90px; 
        transition: 0.3s;
        color: white;
    }
    .low { background-color: #ff5555; }
    .medium { background-color: #ffaa33; }
    .high { background-color: #33cc77; }
    .quality-btn.active { transform: scale(1.1); box-shadow: 0 0 0 3px rgba(255,255,255,0.5); }

    button[type="submit"] { 
        padding: 15px 50px; 
        font-size: 20px; 
        background-color: rgba(0,102,255,0.9); 
        color: white; 
        border: none; 
        border-radius: 12px; 
        cursor: pointer; 
        margin-top: 20px;
        transition: 0.3s;
    }
    button[type="submit"]:hover { background-color: rgba(0,82,204,0.95); }

    .loading { 
        display: none; 
        margin: 25px auto; 
        padding: 15px 30px; 
        background-color: rgba(255,255,255,0.2); 
        border-radius: 10px; 
        font-size: 18px; 
        color: #fff; 
        backdrop-filter: blur(10px);
    }

    .feedback { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); }

    .feedback button { 
        padding: 10px 20px; 
        font-size: 16px; 
        margin: 10px; 
        border: none; 
        border-radius: 12px; 
        cursor: pointer; 
        transition: all 0.3s; 
    }

    .like-btn { background-color: #33cc77; color: white; }
    .dislike-btn { background-color: #ff5555; color: white; }

    #feedback-result { margin-top: 15px; font-size: 16px; color: #fff; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.4); }

    .feedback button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    p { color: #eee; }
</style>
</head>
<body>

<div class="container">
    <h1>PDF Compressor von Finevych A.</h1>
    
    <form id="uploadForm" action="/compress" method="POST" enctype="multipart/form-data">
        <label for="pdf_file" class="custom-file-upload">📄 Datei auswählen</label>
        <input type="file" id="pdf_file" name="pdf_file" accept="application/pdf" required>
        <div id="file-name">Noch keine Datei ausgewählt</div>

        <div class="quality-buttons">
            <button type="button" class="quality-btn low" data-value="50" data-label="Niedrig">Niedrig</button>
            <button type="button" class="quality-btn medium active" data-value="30" data-label="Mittel">Mittel</button>
            <button type="button" class="quality-btn high" data-value="25" data-label="Gut">Gut</button>
        </div>

        <input type="hidden" id="quality" name="quality" value="30">
        <button type="submit" id="submitBtn">PDF komprimieren</button>
    </form>

    <p style="margin-top:15px; font-size:14px;">
        Neue Datei? Einfach Seite neu laden 🔄
    </p>

    <div id="loading" class="loading">PDF wird komprimiert... Bitte warten</div>

    <div class="feedback">
        <p><strong>Hat dir die PDF-Komprimierung geholfen?</strong></p>
        <button class="like-btn" id="likeBtn" onclick="sendFeedback('like')">👍 Ja</button>
        <button class="dislike-btn" id="dislikeBtn" onclick="sendFeedback('dislike')">👎 Nein</button>
        <div id="feedback-result">Lade Statistik...</div>
    </div>
</div>

<script>
/* Твой JS оставляем без изменений */
</script>

</body>
</html>
